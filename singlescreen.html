      align-self: center;

    #game-container {
      flex-shrink: 0;

      height: 720px;  /* 240 * 3 */
    }

    SINGLE SCREEN OVERRIDE
    Replaces all 4 level data objects with versions that fit in 256x240.

  <script>
  /**
   * SINGLE SCREEN LEVEL VARIANTS
   *
   * Design philosophy:
   *   - Everything visible at once (no scrolling), like Donkey Kong
   *   - 256x240 world = 256x240 camera = what you see is all there is
   *   - Player starts bottom-left, goal is top — same as original DK
   *   - Tier spacing compressed from 60px to ~36px
   *   - Ladders remain the primary ascent method (zigzag pattern preserved)
   *   - Each level's identity preserved: L1=skulls, L2=archers+bats,
   *     L3=traps, L4=boss arena
   *   - Fewer tiers where needed (L2: 7→5, L3: 8→6) to avoid cramming
   *   - HUD occupies top ~16px, so top platform sits at y=22 minimum
   *
   * Vertical budget (240px total):
   *   y=0-16    HUD area (score, HP, etc)
   *   y=22      Highest reachable platform
   *   y=210     Ground surface
   *   y=210-240 Ground thickness + offscreen
   */

  // makes the skulls MORE threatening since they cascade faster.
  //
  //   y=22  [SKULL]========================  T5 (summit/checkpoint)
  //   y=58     ========================[L]  T4
  //   y=94  [L]========================     T3
  //   y=130    ========================[L]  T2
  //   y=166 [L]========================     T1
  //   y=210 ================================ GROUND
  // ─────────────────────────────────────────────────────────────────────
