  // ─────────────────────────────────────────────────────────────────────
  // PHANTOM OVERRIDE — Simple fair timer for single-screen
  //
  // The original Phantom tracks vertical progress ("climb higher to
  // dismiss"). That doesn't work well in single-screen where the total
  // vertical space is tiny. Instead: simple timer, and any significant
  // movement (horizontal or vertical) resets it.
  // ─────────────────────────────────────────────────────────────────────

  // Override the PhantomSystem prototype to use a simple position-change
  // tracker instead of vertical-only progress.
  const _origPhantomUpdate = PhantomSystem.prototype.update;
  PhantomSystem.prototype.update = function(delta, player) {
    // Skip boss level (same as original)
    if (GameState.currentLevel === 4) return;
    if (!player || player.state === 'dead') {
      this.idleTimer = 0;
      this.telegraphing = false;
      this.telegraphTimer = 0;
      if (this.warningText) { this.warningText.destroy(); this.warningText = null; }
      if (this.phantomActive) this._despawnPhantom();
      this._lastX = null;
      this._lastY = null;
      return;
    }

    // Track player position — any meaningful movement resets the timer
    if (this._lastX == null) {
      this._lastX = player.x;
      this._lastY = player.y;
    }
    const dx = Math.abs(player.x - this._lastX);
    const dy = Math.abs(player.y - this._lastY);
    if (dx > 20 || dy > 20) {
      // Player moved significantly — reset idle timer
      this.idleTimer = 0;
      this._lastX = player.x;
      this._lastY = player.y;

      // If phantom is chasing, dismiss it after sustained movement
      if (this.phantomActive) {
        this._moveCredit = (this._moveCredit || 0) + dx + dy;
        if (this._moveCredit > 80) {
          this._despawnPhantom();
          this._moveCredit = 0;
          return;
        }
      }
    }

    // ── Phantom already active — chase player ──
    if (this.phantomActive) {
      this._updatePhantom(delta, player);
      return;
    }

    // ── Telegraph phase ──
    if (this.telegraphing) {
      this.telegraphTimer -= delta;
      if (this.warningText) {
        const flash = Math.floor(Date.now() / 200) % 2;
        this.warningText.setAlpha(flash === 0 ? 0.3 : 1.0);
      }
      if (this.telegraphTimer <= 0) {
        this._spawnPhantom(player);
      }
      return;
    }

    // ── Idle timer — just counts up, no vertical check ──
    this.idleTimer += delta;
    if (this.idleTimer >= this.triggerTime) {
      this._startTelegraph(player);
    }
  };

  // Override trigger time calc for single-screen (45s base, 20s min)
  // The screen is smaller so players move around more — be fair.
  PhantomSystem.prototype._calcTriggerTime = function() {
    const loop = GameState.currentLoop || 1;
    const time = 45000 - (loop - 1) * 3000;
    return Math.max(20000, time);
  };

  // BOTTOM HUD — move HUD from top to bottom of screen
  //
  // Frees the entire top of the screen for gameplay. HUD bar sits at
  // y=230 (bottom 10px). Boss health bar (L4 only) moves above it.
  // ─────────────────────────────────────────────────────────────────────

  const _origHudBuild = HUD.prototype._build;
  HUD.prototype._build = function() {
    const W = this.scene.cameras.main.width;   // 256
    const H = this.scene.cameras.main.height;  // 240
    const s = this.scene;
    const HUD_Y = 231;  // text baseline in the bottom bar

    const COMPACT_STYLE = {
      fontFamily: HUD_FONT,
      fontSize:   '7px',
      stroke:     '#000000',
      strokeThickness: 2,
      padding:    { top: 1, bottom: 1 },
      shadow: { offsetX: 1, offsetY: 1, color: '#000000', blur: 0, fill: true },
    };

    // ── Background bar at BOTTOM ──
    this.bgBar = s.add.rectangle(0, 230, W, 10, 0x000000, 0.7)
      .setOrigin(0, 0).setScrollFactor(0).setDepth(10);

    // ── HP Hearts ──
    this.heartContainer = s.add.container(2, HUD_Y).setScrollFactor(0).setDepth(11);

    // ── MP ──
    this.mpText = s.add.text(70, HUD_Y, 'MP:6', { ...COMPACT_STYLE, color: '#4488ff' })
      .setScrollFactor(0).setDepth(11);

    // ── XP ──
    this.xpText = s.add.text(100, HUD_Y, 'XP:0', { ...COMPACT_STYLE, color: '#ffdd44' })
      .setScrollFactor(0).setDepth(11);

    // ── LV ──
    this.lvText = s.add.text(132, HUD_Y, 'LV:1', { ...COMPACT_STYLE, color: '#44cc66' })
      .setScrollFactor(0).setDepth(11);

    // ── Special attack ──
    this.specialText = s.add.text(158, HUD_Y, 'SP:knife', { ...COMPACT_STYLE, color: '#ff8844' })
      .setScrollFactor(0).setDepth(11);

    // ── Score (bottom right) ──
    this.scoreText = s.add.text(W - 2, HUD_Y, 'SCORE:0', { ...COMPACT_STYLE, color: '#f7b731' })
      .setOrigin(1, 0).setScrollFactor(0).setDepth(11);

    // ── Loop indicator (bottom center) ──
    this.loopText = s.add.text(W / 2, HUD_Y, '', { ...COMPACT_STYLE, color: '#c77dff' })
      .setOrigin(0.5, 0).setScrollFactor(0).setDepth(11);

    // ── Soul arrow ──
    this.soulArrow = s.add.text(0, 0, '', {
      fontFamily: HUD_FONT, fontSize: '8px', color: '#ffdd44',
      stroke: '#000000', strokeThickness: 2
    }).setScrollFactor(0).setDepth(11).setVisible(false);

    // ── Boss health bar (above HUD bar for L4) ──
    this._bossBarBg = s.add.rectangle(W / 2, 224, 180, 8, 0x333333, 0.8)
      .setScrollFactor(0).setDepth(10).setVisible(false);
    this._bossBarFill = s.add.rectangle(W / 2, 224, 180, 8, 0xff2244, 1.0)
      .setScrollFactor(0).setDepth(11).setVisible(false);
    this._bossBarBorder = s.add.rectangle(W / 2, 224, 182, 10, 0x000000, 0)
      .setScrollFactor(0).setDepth(9).setVisible(false);
    const borderGfx = s.add.graphics().setScrollFactor(0).setDepth(9).setVisible(false);
    borderGfx.lineStyle(1, 0xffffff, 0.6);
    borderGfx.strokeRect(W / 2 - 91, 219, 182, 10);
    this._bossBarBorderGfx = borderGfx;
    this._bossLabel = s.add.text(W / 2, 218, 'THE DARK KNIGHT', {
      fontFamily: HUD_FONT, fontSize: '7px', color: '#ff6666',
      stroke: '#000000', strokeThickness: 2,
    }).setOrigin(0.5, 1).setScrollFactor(0).setDepth(11).setVisible(false);
    this._bossBarVisible = false;

    this.update(null);
  };

  // Override heart rebuild to use smaller icons for bottom HUD
  const _origRebuildHearts = HUD.prototype._rebuildHearts;
  HUD.prototype._rebuildHearts = function(hp, maxHp) {
    this.heartContainer.removeAll(true);
    const SIZE = 4;
    const GAP  = 1;
    const MAX_DISPLAY = Math.min(maxHp, 20);
    for (let i = 0; i < MAX_DISPLAY; i++) {
      const full  = i < hp;
      const color = full ? 0xff4444 : 0x553333;
      const icon  = this.scene.add.rectangle(
        i * (SIZE + GAP), 0, SIZE, SIZE, color
      ).setOrigin(0, 0);
      this.heartContainer.add(icon);
    }
  };

  console.log('[SINGLE SCREEN] Bottom HUD (y=230, 10px bar)');


  // ─────────────────────────────────────────────────────────────────────
  // DEBUG TEXT — move to bottom of screen so it doesn't crowd gameplay
  // ─────────────────────────────────────────────────────────────────────

  const _origBuildDebugText = GameScene.prototype._buildDebugText;
  GameScene.prototype._buildDebugText = function() {
    _origBuildDebugText.call(this);
    // Move debug label to top-right (HUD is now at bottom)
    if (this._debugText) {
      this._debugText.setY(2);
      this._debugText.setX(252);
      this._debugText.setOrigin(1, 0);
      this._debugText.setFontSize('6px');
    }
    // Move gamepad debug text above HUD bar (was at y=230, overlapping bottom HUD)
    if (this._gpDebugText) {
      this._gpDebugText.setY(2);
      this._gpDebugText.setX(4);
      this._gpDebugText.setFontSize('6px');
    }
  };


  // ─────────────────────────────────────────────────────────────────────
  // SHORTER PLAYER — DK-style proportions for single-screen
  //
  // Original player: 12x26 visual, 10x22 hitbox, 12 duck hitbox
  // Single-screen:   12x18 visual, 10x14 hitbox, 9 duck hitbox
  //
  // ~8px shorter — DK/Jumpman proportions. Archer arrows lowered
  // to compensate so they still threaten the shorter player.
  // ─────────────────────────────────────────────────────────────────────

  const SS_BODY_W = 10;
  const SS_BODY_H = 14;
  const SS_DUCK_H = 9;

  // Override _buildSprite to draw a shorter player
  const _origBuildSprite = PlayerEntity.prototype._buildSprite;
  PlayerEntity.prototype._buildSprite = function(x, y) {
    const texW = SS_BODY_W + 2;  // 12
    const texH = SS_BODY_H + 4;  // 18

    const gfx = this.scene.add.graphics();
    gfx.fillStyle(0xeeeeee);
    gfx.fillRect(1, 0, 10, 5);     // head
    gfx.fillStyle(0xcccccc);
    gfx.fillRect(1, 5, 10, 7);     // torso
    gfx.fillStyle(0x999999);
    gfx.fillRect(1, 12, 4, 6);     // left leg
    gfx.fillRect(7, 12, 4, 6);     // right leg
    gfx.generateTexture('player_placeholder', texW, texH);
    gfx.destroy();

    this.sprite = this.scene.physics.add.sprite(x, y, 'player_placeholder');
    this.sprite.setOrigin(0.5, 1);
    this.sprite.setCollideWorldBounds(true);
    // Allow hopping above the top of the screen (summit is only 24px from ceiling)
    this.scene.physics.world.setBoundsCollision(true, true, false, true);

    this.sprite.body.setSize(SS_BODY_W, SS_BODY_H);
    this.sprite.body.setOffset(
      (this.sprite.width - SS_BODY_W) / 2,
      this.sprite.height - SS_BODY_H
    );

    this.sprite.body.setGravityY(600); // same as PLAYER_GRAVITY
    this.sprite.setTint(this._baseTint());
  };

  // Override duck/stand body transitions to use shorter dimensions
  const _origStartDuck = PlayerEntity.prototype._startDuck;
  PlayerEntity.prototype._startDuck = function() {
    _origStartDuck.call(this);
    // Re-apply shorter body after original sets the const DUCK_H
    this.sprite.body.setSize(SS_BODY_W, SS_DUCK_H);
    this.sprite.body.setOffset(
      (this.sprite.width - SS_BODY_W) / 2,
      this.sprite.height - SS_DUCK_H
    );
  };

  const _origEndDuck = PlayerEntity.prototype._endDuck;
  PlayerEntity.prototype._endDuck = function() {
    _origEndDuck.call(this);
    this.sprite.body.setSize(SS_BODY_W, SS_BODY_H);
    this.sprite.body.setOffset(
      (this.sprite.width - SS_BODY_W) / 2,
      this.sprite.height - SS_BODY_H
    );
  };

  // _exitDuck also resets to standing size
  const _origExitDuck = PlayerEntity.prototype._exitDuck;
  PlayerEntity.prototype._exitDuck = function() {
    _origExitDuck.call(this);
    this.sprite.body.setSize(SS_BODY_W, SS_BODY_H);
    this.sprite.body.setOffset(
      (this.sprite.width - SS_BODY_W) / 2,
      this.sprite.height - SS_BODY_H
    );
  };

  // Dodge uses duck height, then endDodge resets to standing
  const _origStartDodge = PlayerEntity.prototype._startDodge;
  PlayerEntity.prototype._startDodge = function(dir) {
    _origStartDodge.call(this, dir);
    this.sprite.body.setSize(SS_BODY_W, SS_DUCK_H);
    this.sprite.body.setOffset(
      (this.sprite.width - SS_BODY_W) / 2,
      this.sprite.height - SS_DUCK_H
    );
  };

  const _origEndDodge = PlayerEntity.prototype._endDodge;
  PlayerEntity.prototype._endDodge = function() {
    _origEndDodge.call(this);
    this.sprite.body.setSize(SS_BODY_W, SS_BODY_H);
    this.sprite.body.setOffset(
      (this.sprite.width - SS_BODY_W) / 2,
      this.sprite.height - SS_BODY_H
    );
  };

  // Override archer arrow Y so it still hits shorter player.
  // Original: sprite.y - 13 (upper body of 18px archer).
  // Shorter player stands ~8px lower relative to platform, so
  // arrows need to fire lower to threaten them: sprite.y - 7.
  const _origFireArrow = HollowArcher.prototype._fireArrow;
  HollowArcher.prototype._fireArrow = function(player, shootDown) {
    this.fireCooldown = HA_FIRE_COOLDOWN;
    this.state = ENEMY_STATE.ATTACK;

    this.sprite.setTint(0xffffff);
    this.scene.time.delayedCall(150, () => {
      if (!this._dead) this._restoreTint();
    });

    const ax = this.sprite.x + this.facing * 8;
    const ay = this.sprite.y - 7;  // lowered for 14px player

    const arrow = this.scene.add.rectangle(ax, ay, 8, 3, 0xddddaa);
    this.scene.physics.add.existing(arrow);
    arrow.body.setAllowGravity(false);

    if (shootDown) {
      arrow.body.setVelocityX(this.facing * HA_ARROW_SPEED * 0.6);
      arrow.body.setVelocityY(HA_ARROW_SPEED * 0.8);
      arrow.setRotation(this.facing > 0 ? 0.6 : -0.6);
    } else {
      arrow.body.setVelocityX(this.facing * HA_ARROW_SPEED);
    }

    arrow.body.setSize(8, 3);
    arrow.setDepth(4);

    this.arrows.push({
      obj: arrow,
      lifetime: HA_ARROW_LIFETIME,
    });
  };

  console.log('[SINGLE SCREEN] Shorter player (14px hitbox) + lowered archer arrows');


  // ─────────────────────────────────────────────────────────────────────
  // BOSS SPAWN — override hardcoded position to match shifted ground
  // ─────────────────────────────────────────────────────────────────────
  const _origTriggerBoss = GameScene.prototype._triggerBoss;
  GameScene.prototype._triggerBoss = function() {
    _origTriggerBoss.call(this);
    // Move boss down to match new ground at y=218 (was spawned at y=200)
    if (this.boss && this.boss.sprite) {
      this.boss.sprite.setY(208);
    }
  };

  // ─────────────────────────────────────────────────────────────────────
  // Re-register all levels
  // ─────────────────────────────────────────────────────────────────────
  LevelRegistry[1] = Level1Data;
  LevelRegistry[2] = Level2Data;
  LevelRegistry[3] = Level3Data;
  LevelRegistry[4] = Level4Data;

  console.log('[SINGLE SCREEN v2] Level data overridden — spacious layouts, fair phantom timer');
  </script>

  <!-- Game entry point (must come last) -->
  <script src="src/main.js"></script>
</body>
